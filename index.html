<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Balloon Task Dashboard</title>
    <script src="https://unpkg.com/interactjs/dist/interact.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        
        /* Sidebar per aggiungere task */
        .sidebar { width: 250px; background: #fff; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 10; }
        
        /* L'area dove volano i palloncini */
        .canvas { flex-grow: 1; position: relative; overflow: hidden; background: white; }

        /* Stile dei Palloncini */
        .balloon {
            width: 100px; height: 100px;
            border-radius: 50%;
            position: absolute;
            display: flex; align-items: center; justify-content: center;
            text-align: center; color: white; font-weight: bold; padding: 10px;
            cursor: move; touch-action: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .balloon:active { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>Nuovo Task</h2>
        <input type="text" id="taskName" placeholder="Cosa devi fare?"><br><br>
        <select id="taskColor">
            <option value="#ff6b6b">Urgente (Rosso)</option>
            <option value="#4facfe">Normale (Blu)</option>
            <option value="#6ab04c">Lungo termine (Verde)</option>
        </select><br><br>
        <button onclick="addBalloon()">Crea Palloncino</button>
    </div>
    <div class="canvas" id="canvas">
        </div>
</div>

<script>
    function addBalloon() {
        const name = document.getElementById('taskName').value;
        const color = document.getElementById('taskColor').value;
        if(!name) return;

        const b = document.createElement('div');
        b.className = 'balloon';
        b.innerText = name;
        b.style.backgroundColor = color;
        // Posizione iniziale casuale
        b.style.left = Math.random() * 500 + 'px';
        b.style.top = Math.random() * 500 + 'px';

        document.getElementById('canvas').appendChild(b);
        document.getElementById('taskName').value = '';
    }

    // Rende i palloncini trascinabili
    interact('.balloon').draggable({
        listeners: {
            move (event) {
                var target = event.target
                var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx
                var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy

                target.style.transform = 'translate(' + x + 'px, ' + y + 'px)'
                target.setAttribute('data-x', x)
                target.setAttribute('data-y', y)
            }
        }
    })
</script>

</body>
</html>
